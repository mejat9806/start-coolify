[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.build]
# We remove 'ls -R .output' because it doesn't exist; use dist instead
cmds = ["npm ci", "npm run build", "ls -R dist"]

[start]
# Point to the actual file created in your log: dist/server/server.js
cmd = "HOST=0.0.0.0 PORT=3000 node .output/server/index.mjs"