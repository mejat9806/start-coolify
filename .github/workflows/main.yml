name: Preview Deploy (Label Triggered)

on:
  pull_request:
    types: [labeled, synchronize, unlabeled, closed]

jobs:
  deploy:
    if: |
      contains(github.event.pull_request.labels.*.name, 'deploy-preview') && 
      (github.event.action == 'labeled' || github.event.action == 'synchronize')

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Force Coolify to Sync PRs
        # This tells Coolify to refresh its list of PRs from GitHub
        run: |
          curl -i -X GET "http://178.104.106.0:8000/api/v1/applications/h5k0i96ckappu8zbxokld7wo/pull-requests" \
               -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"

      - name: Trigger Coolify Deployment
        run: |
          # Now that we've synced, we trigger the build
          curl -i -X POST "http://178.104.106.0:8000/api/v1/deploy?uuid=h5k0i96ckappu8zbxokld7wo&pr=${{ github.event.number }}&branch=${{ github.head_ref }}&force=true" \
               -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
               -H "Accept: application/json"
      - name: Post Preview URL to PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const previewUrl = `http://${prNumber}.vs11mjbyy6mnarvetuzcbdtt.178.104.106.0.sslip.io`;

            if (context.payload.action === 'labeled') {
              github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🚀 **Preview Deployment Triggered!**\n\nYour frontend changes are being queued. Check the Coolify dashboard for progress.\n\nURL: ${previewUrl}`
              })
            }
