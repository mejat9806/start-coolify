name: Preview Deploy (Label Triggered)

on:
  pull_request:
    types: [labeled, synchronize, unlabeled, closed]

jobs:
  deploy:
    # Trigger if the label 'deploy-preview' is present on a new label or new code push
    if: |
      contains(github.event.pull_request.labels.*.name, 'deploy-preview') && 
      (github.event.action == 'labeled' || github.event.action == 'synchronize')

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Trigger Coolify Deployment
        run: |
          # Use the 'deploy' endpoint with your Application UUID
          curl -X POST "http://178.104.106.0:8000/api/v1/deploy?uuid=h5k0i96ckappu8zbxokld7wo&branch=${{ github.head_ref }}&pull_request_id=${{ github.event.number }}" \
               -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"

      - name: Post Preview URL to PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const previewUrl = `http://${prNumber}.vs11mjbyy6mnarvetuzcbdtt.178.104.106.0.sslip.io`;

            // Only post the comment when the label is first added
            if (context.payload.action === 'labeled') {
              github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🚀 **Preview Deployment Triggered!**\n\nYour frontend changes are being built. Once ready, you can view them here:\n${previewUrl}\n\n*Note: It may take a minute for the build to finish.*`
              })
            }

  cleanup:
    # Auto-cleanup logic for when you're done reviewing
    if: |
      github.event.action == 'closed' || 
      (github.event.action == 'unlabeled' && github.event.label.name == 'deploy-preview')

    runs-on: ubuntu-latest
    steps:
      - name: Stop Coolify Preview
        run: |
          echo "PR closed/unlabeled. Coolify 'Auto Cleanup' (in App Settings) will stop the container for branch ${{ github.head_ref }}."
