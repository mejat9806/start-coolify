name: Dokploy Preview (Label Triggered)

on:
  pull_request:
    types: [labeled, synchronize]

jobs:
  deploy:
    # Only runs when the 'deploy-preview' label is added or code is updated while labeled
    if: contains(github.event.pull_request.labels.*.name, 'deploy-preview')

    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy Preview
        run: |
          # We use the PREVIEW creation endpoint, not the standard deploy endpoint
          curl -X 'POST' \
            'http://65.21.5.55:3000/api/project.deployment.create' \
            -H 'accept: application/json' \
            -H 'Content-Type: application/json' \
            -H 'Authorization: Bearer ${{ secrets.DOKPLOY_TOKEN }}' \
            -d '{
              "applicationId": "obp81u0sUC1UrTqfNegmL",
              "pullRequestId": ${{ github.event.number }},
              "branch": "${{ github.head_ref }}"
            }'
