name: Preview Deploy (Label Triggered)

on:
  pull_request:
    types: [labeled]

jobs:
  deploy:
    if: github.event.label.name == 'deploy-preview'
    runs-on: ubuntu-latest
    # ADD THESE PERMISSIONS HERE
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Trigger Coolify Deployment
        run: |
          curl -X GET "${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}&branch=${{ github.head_ref }}" \
               -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"

      - name: Post Preview URL to PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const previewUrl = `http://${prNumber}.vs11mjbyy6mnarvetuzcbdtt.178.104.106.0.sslip.io`;

            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: ` **Preview Deployment Triggered!**\n\nYour frontend changes are being built. Once ready, you can view them here:\n${previewUrl}\n\n*Note: It may take a minute for the container to start.*`
            })
