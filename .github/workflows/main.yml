name: Preview Deploy (Label Triggered)

on:
  pull_request:
    types: [labeled]

jobs:
  deploy:
    # Only run if the label 'deploy-preview' was added
    if: github.event.label.name == 'deploy-preview'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Deployment
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}&branch=${{ github.head_ref }}" \
               -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}")

          if [ "$RESPONSE" -eq 200 ]; then
            echo "Deployment triggered successfully!"
          else
            echo "Deployment failed with status: $RESPONSE"
            exit 1
          fi
