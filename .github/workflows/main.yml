name: Preview Deploy (Label Triggered)

on:
  pull_request:
    # 'synchronize' updates the build when you push new code
    # 'unlabeled' or 'closed' helps you manage VPS RAM
    types: [labeled, synchronize, unlabeled, closed]

jobs:
  deploy:
    # Run if 'deploy-preview' label is present AND it's a new label or a new commit
    if: |
      contains(github.event.pull_request.labels.*.name, 'deploy-preview') && 
      (github.event.action == 'labeled' || github.event.action == 'synchronize')

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Trigger Coolify Deployment
        run: |
          # We use the /deploy endpoint which is more resilient for self-hosted instances.
          # We pass 'pr', 'branch', and 'uuid' in the query to match your browser trace.
          curl -i -X POST "http://178.104.106.0:8000/api/v1/deploy?uuid=h5k0i96ckappu8zbxokld7wo&pr=${{ github.event.number }}&branch=${{ github.head_ref }}&force=true" \
               -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
               -H "Accept: application/json"

      - name: Post Preview URL to PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const previewUrl = `http://${prNumber}.vs11mjbyy6mnarvetuzcbdtt.178.104.106.0.sslip.io`;

            // Only post the comment when the label is first added to avoid spamming the PR
            if (context.payload.action === 'labeled') {
              github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🚀 **Preview Deployment Triggered!**\n\nYour frontend changes are being queued. Once ready, you can view them here:\n${previewUrl}\n\n*Note: It may take a minute for the build to finish.*`
              })
            }

  cleanup:
    # This job ensures you don't waste resources on your VPS
    if: |
      github.event.action == 'closed' || 
      (github.event.action == 'unlabeled' && github.event.label.name == 'deploy-preview')

    runs-on: ubuntu-latest
    steps:
      - name: Stop Coolify Preview
        run: |
          # Ensure 'Auto Cleanup' is enabled in your Coolify Application Settings
          echo "PR closed/unlabeled. Coolify will now clean up the container for branch ${{ github.head_ref }}."
